ci:
  autoupdate_schedule: "quarterly"
repos:
- repo: https://github.com/pre-commit/pre-commit-hooks
  rev: v6.0.0
  hooks:
  - id: check-yaml
  - id: debug-statements
- repo: https://github.com/astral-sh/ruff-pre-commit
  rev: v0.15.13
  hooks:
    - id: ruff-check
    - id: ruff-format
- repo: https://github.com/tox-dev/pyproject-fmt
  rev: v2.21.0
  hooks:
    - id: pyproject-fmt

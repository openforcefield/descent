[workspace]
authors = ["Open Force Field Initiative <info@openforcefield.org>"]
channels = ["conda-forge"]
name = "descent"
platforms = [ "linux-64", "osx-arm64" ]

[tasks]
run_tests = "python -m pytest -v --cov=descent --cov-append --cov-report=xml --color=yes descent/tests/"
run_mypy = "python -m mypy descent/"
make_docs = "sphinx-build -b html docs docs/_build/html"
clean_docs = "rm -rf docs/_build docs/api/generated"

[dependencies]
python = ">=3.12"
setuptools-scm = ">=8"
pip = "*"
smee-base = ">=0.10.0"
msgpack-python = "*"
pydantic = "*"
pydantic-units = "*"
openff-interchange = "0.5.*"
pytorch = "*"
pyarrow = "*"
datasets = "*"
scipy = "*"
rdkit = "*"
matplotlib-base = "*"
panel = "*"
openmm = "*"
jupyter = "*"
nbconvert = "*"
tensorboard = "*"
tensorboardx = "*"
uncertainties = "*"

[pypi-dependencies]
descent = { path = ".", editable = true }

[feature.dev.dependencies]
pre-commit = "*"
ruff = "*"
nbqa = "*"

[feature.test.dependencies]
ambertools = "*"
pytest = "*"
pytest-cov = "*"
pytest-mock = "*"
codecov = "*"

[feature.docs.dependencies]
sphinx = ">=6.0,<7.0"
myst-nb = ">=1.0"
myst-parser = ">=2.0"
sphinx-notfound-page = "*"
sphinxcontrib-bibtex = ">=2.5"
ipython = "*"
libsass = "*"

[feature.docs.pypi-dependencies]
openff-sphinx-theme = { git = "https://github.com/openforcefield/openff-sphinx-theme.git" }

[feature.py312.dependencies]
python = "3.12.*"

[feature.py313.dependencies]
python = "3.13.*"

[feature.typing.pypi-dependencies]
mypy = "*"
scipy-stubs = "*"
types-tqdm = "*"
pandas-stubs = "*"

[environments]
py312 = [ "py312", "test", "typing" ]
py313 = [ "py313", "test", "typing" ]
dev = [ "py312", "test", "typing", "dev" ]
docs = [ "py312", "docs" ]
